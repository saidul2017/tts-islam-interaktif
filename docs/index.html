const d13=s=>s.replace(/[A-Z]/g,c=>String.fromCharCode((c.charCodeAt(0)-65+13)%26+65));

const ENC={"p1": {"r": 20, "c": 25, "w": [[2, "ONVNG", "Sumpah setia dan pengakuan formal terhadap seorang pemimpin", 1, 2, 1], [3, "SVGAN", "Kekacauan atau perang saudara dalam komunitas Muslim", 1, 8, 1], [5, "DNQUV", "Hakim dalam sistem hukum Islam", 2, 2, 1], [6, "XUHZHF", "Seperlima dari rampasan perang yang diserahkan kepada negara", 2, 9, 1], [9, "ANUWHY", "Kompilasi khotbah dan surat Ali: ___ Balaghah", 4, 3, 1], [13, "UVWEVNU", "Kalender lunar Islam yang ditetapkan Umar", 5, 4, 1], [14, "VZNZNU", "Doktrin Syiah tentang kepemimpinan ilahi", 5, 14, 1], [15, "VWGVUNQ", "Penalaran independen untuk merumuskan hukum syariat", 6, 5, 1], [18, "JNYV", "Gubernur provinsi yang ditunjuk oleh khalifah", 7, 0, 1], [20, "DNQVFVLLNU", "Pertempuran besar melawan Sassanid Persia (636 M)", 8, 5, 1], [24, "QVJNA", "Register resmi negara untuk distribusi tunjangan", 9, 20, 1], [25, "HZZNU", "Komunitas Muslim secara keseluruhan", 10, 0, 1], [27, "FHAANU", "Preseden dan praktik Nabi; sumber hukum Islam kedua", 10, 17, 1], [29, "LNEZBHX", "Pertempuran pembuka penguasaan Muslim atas Suriah", 11, 17, 1], [30, "QUVZZV", "Non-Muslim di bawah perlindungan negara Islam", 12, 4, 1], [32, "XUNJNEVW", "Kelompok pemisah dari Ali setelah Arbitrase Shiffin", 12, 11, 1], [34, "FUVSSVA", "Pertempuran Ali vs Muawiyah di tepi Eufrat", 14, 12, 1], [36, "WVMLN", "Pajak per kapita oleh pria dewasa non-Muslim", 15, 1, 1], [38, "UNSVM", "Penghafal seluruh Al-Quran", 15, 7, 1], [39, "HFUE", "Bea cukai di pos-pos perbatasan negara Islam", 17, 14, 1], [40, "FNJNQ", "Wilayah subur antara Sungai Tigris dan Eufrat", 18, 2, 1], [1, "EVQQNU", "Kemurtadan/pembangkangan politis terhadap Madinah", 0, 4, 0], [4, "NZFUNE", "Kota-kota garnisun di wilayah taklukan", 1, 12, 0], [7, "FNDVSNU", "Tempat bai'at pertama kepada Abu Bakar", 2, 14, 0], [8, "ZNJNYV", "Muslim non-Arab, umumnya mantan budak", 2, 16, 0], [10, "XUNYVSNU", "Jabatan kepala negara Islam pasca-Nabi SAW", 4, 10, 0], [11, "JNDNS", "Aset sedekah permanen untuk kepentingan umum", 4, 18, 0], [12, "FUHEN", "Prinsip musyawarah kolektif dalam Islam", 4, 19, 0], [16, "TUNAVZNU", "Rampasan perang pasukan Muslim", 6, 13, 0], [17, "ZHNJVLNU", "Gubernur Suriah yang menolak tunduk kepada Ali", 6, 15, 0], [19, "VWZN", "Konsensus ulama; sumber hukum Islam ketiga", 7, 3, 0], [21, "FLNEVNG", "Hukum Islam dari Al-Quran dan Sunnah", 8, 9, 0], [22, "ENFLVQVA", "Sebutan empat khalifah pertama", 8, 17, 0], [23, "GNUXVZ", "Arbitrase setelah Pertempuran Shiffin", 8, 23, 0], [26, "UHQHQ", "Hukuman tetap yang ditetapkan Al-Quran", 10, 4, 0], [28, "XUNENW", "Pajak tanah pertanian wilayah taklukan", 11, 5, 0], [31, "ZHFUNS", "Al-Quran dalam bentuk tertulis terjilid", 12, 7, 0], [33, "WNZNY", "Pertempuran di Basra; unta Aisyah", 14, 8, 0], [35, "SVDU", "Yurisprudensi Islam; ilmu hukum syariat", 14, 16, 0], [37, "MNXNG", "Kewajiban fiskal; salah satu Rukun Islam", 15, 3, 0]]}, "p2": {"r": 29, "c": 27, "w": [[1, "VXUJNA", "Persaudaraan; ukhuwah Islamiyah", 0, 16, 1], [4, "MRYYVTR", "Seni mosaik keramik geometris Maroko", 1, 18, 1], [5, "BGGBZNA", "Kekaisaran Islam terakhir, tiga benua", 3, 15, 1], [7, "NFGEBYNOR", "Instrumen astronomi ilmuwan Muslim", 6, 17, 1], [8, "NYWNONE", "Matematika oleh Al-Khawarizmi", 7, 20, 1], [9, "GNEVDNU", "Jalan spiritual; ordo sufi", 8, 14, 1], [10, "UNZZNZ", "Pemandian umum khas peradaban Islam", 9, 0, 1], [13, "ZNFWVQ", "Tempat ibadah utama umat Islam", 10, 4, 1], [14, "NYTBEVGZN", "Prosedur komputasi dari Al-Khawarizmi", 10, 13, 1], [17, "ZVUENO", "Ceruk masjid penunjuk arah kiblat", 12, 8, 1], [18, "NAQNYHFVN", "Wilayah Islam di Semenanjung Iberia", 13, 5, 1], [19, "GNFNJHS", "Dimensi spiritual-mistis Islam", 14, 11, 1], [20, "OVZNEVFGNA", "Rumah sakit Islam abad pertengahan", 15, 8, 1], [21, "NENORFDHR", "Seni dekoratif pola geometris Islam", 17, 11, 1], [23, "SNYNX", "Ilmu astronomi Islam; waktu shalat & kiblat", 19, 4, 1], [26, "XNVEBHNA", "Kota suci keempat Islam di Tunisia", 22, 4, 1], [28, "ONVGHY", "Pusat riset Baghdad: ___ Hikmah", 25, 9, 1], [2, "NYUNZOEN", "Istana Islam megah di Granada, Spanyol", 0, 20, 0], [3, "EVUYN", "Tradisi perjalanan ilmiah; Ibnu Battuta", 0, 22, 0], [6, "XNYVTENSV", "Seni menulis indah huruf Arab", 5, 17, 0], [11, "ZNQENFNU", "Lembaga pendidikan Islam formal", 9, 5, 0], [12, "HZNLLNU", "Dinasti Islam pertama di Damaskus", 9, 20, 0], [14, "NOONFVLNU", "Dinasti Baghdad pusat keilmuan dunia", 10, 13, 0], [15, "NIREEBRF", "Ibnu Rusyd; komentator Aristoteles", 10, 21, 0], [16, "ZVANERG", "Menara masjid untuk adzan", 11, 6, 0], [21, "NIVPRAAN", "Ibnu Sina; bapak kedokteran Islam", 17, 11, 0], [22, "JNMVE", "Perdana menteri khalifah/sultan", 18, 7, 0], [24, "NYUNMRA", "Ibnu Haitham; bapak optika modern", 19, 5, 0], [25, "ZHDNEANF", "Ornamen sarang lebah 3D Islam", 19, 10, 0], [27, "FHYGNA", "Gelar penguasa pasca-kekhalifahan", 23, 14, 0]]}};

function parse(p){
  const grid=Array.from({length:p.r},()=>Array.from({length:p.c},()=>({l:"",n:0,a:false})));
  const c2w={};
  const words=p.w.map(([num,enc,clue,row,col,isA],idx)=>{
    const word=d13(enc.toUpperCase());
    const dir=isA?"across":"down";
    for(let i=0;i<word.length;i++){
      const r=dir==="across"?row:row+i, c=dir==="across"?col+i:col;
      if(r<p.r&&c<p.c){
        grid[r][c].l=word[i]; grid[r][c].a=true;
        if(i===0) grid[r][c].n=num;
        const k=`${r}-${c}`;
        if(!c2w[k]) c2w[k]=[];
        c2w[k].push({idx,dir});
      }
    }
    return{num,word,clue,row,col,dir,len:word.length};
  });
  return{grid,R:p.r,C:p.c,words,c2w,
    ac:words.filter(w=>w.dir==="across").sort((a,b)=>a.num-b.num),
    dn:words.filter(w=>w.dir==="down").sort((a,b)=>a.num-b.num)};
}

const PZ={
  1:{...parse(ENC.p1),title:"TTS I — Khulafaur Rasyidin",sub:"Politik, Hukum, Militer & Ekonomi",label:"TTS I"},
  2:{...parse(ENC.p2),title:"TTS II — Peradaban Islam",sub:"Ilmu Pengetahuan, Seni & Arsitektur",label:"TTS II"}
};

const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const getCells=w=>{const out=[];for(let i=0;i<w.word.length;i++){const r=w.dir==="across"?w.row:w.row+i;const c=w.dir==="across"?w.col+i:w.col;out.push({r,c,k:`${r}-${c}`,l:w.word[i]})}return out};
const wkey=w=>w.num+"-"+w.dir;

/* ═══════ GOOGLE SHEETS API ═══════ */
async function submitScore(data){
  if(!SCRIPT_URL) return{success:false,error:"offline"};
  try{
    const res=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(data),headers:{"Content-Type":"text/plain"}});
    return await res.json();
  }catch(e){return{success:false,error:e.message}}
}

async function fetchLeaderboard(puzzle){
  if(!SCRIPT_URL) return{success:false,error:"offline"};
  try{
    const url=puzzle?`${SCRIPT_URL}?puzzle=${encodeURIComponent(puzzle)}&limit=20`:`${SCRIPT_URL}?limit=20`;
    const res=await fetch(url);
    return await res.json();
  }catch(e){return{success:false,error:e.message}}
}

/* ═══════ MAIN APP ═══════ */
function App(){
  // Screen: "login" | "home" | "puzzle" | "leaderboard"
  const[screen,setScreen]=useState("login");
  const[nama,setNama]=useState("");
  const[nim,setNim]=useState("");

  const[pid,setPid]=useState(null);
  const[input,setInput]=useState({});
  const[secs,setSecs]=useState(0);
  const[running,setRunning]=useState(false);
  const[paused,setPaused]=useState(false);
  const[score,setScore]=useState(0);
  const[solved,setSolved]=useState(new Set());
  const[hinted,setHinted]=useState(new Set());
  const[active,setActive]=useState(null);
  const[cursor,setCursor]=useState(null);
  const[cellSt,setCellSt]=useState({});
  const[done,setDone]=useState(false);
  const[exitDlg,setExitDlg]=useState(false);
  const[winW,setWinW]=useState(typeof window!=="undefined"?window.innerWidth:400);

  // Submission state
  const[submitting,setSubmitting]=useState(false);
  const[submitResult,setSubmitResult]=useState(null);
  const[submitted,setSubmitted]=useState(false);

  // Leaderboard state
  const[lbData,setLbData]=useState(null);
  const[lbLoading,setLbLoading]=useState(false);
  const[lbPuzzle,setLbPuzzle]=useState(null);
  // Setup guide screen
  const[showSetup,setShowSetup]=useState(false);

  const refs=useRef({});
  const tRef=useRef(null);

  const pz=pid?PZ[pid]:null;
  const total=pz?pz.words.length:0;

  useEffect(()=>{
    clearInterval(tRef.current);
    if(running&&!paused) tRef.current=setInterval(()=>setSecs(t=>t+1),1000);
    return()=>clearInterval(tRef.current);
  },[running,paused]);

  useEffect(()=>{
    const h=()=>setWinW(window.innerWidth);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);

  useEffect(()=>{
    if(!done||!pz) return;
    try{
      const entry={nama:nama.trim(),nim:nim.trim(),puzzle:pz.label,skor:score,waktu:fmt(secs),hints:hinted.size,totalKata:total,kataBenar:solved.size,timestamp:new Date().toISOString()};
      const prev=JSON.parse(localStorage.getItem('tts_scores')||'[]');
      prev.push(entry);
      localStorage.setItem('tts_scores',JSON.stringify(prev.slice(-100)));
    }catch(e){}
  },[done]);

  const selSet=useMemo(()=>{
    if(!active) return new Set();
    return new Set(getCells(active).map(c=>c.k));
  },[active]);

  const start=useCallback(id=>{
    const p=PZ[id]; const u={};
    for(let r=0;r<p.R;r++) for(let c=0;c<p.C;c++) if(p.grid[r][c].a) u[`${r}-${c}`]="";
    setPid(id); setInput(u); setSecs(0); setRunning(true); setPaused(false);
    setScore(0); setSolved(new Set()); setHinted(new Set());
    setActive(null); setCursor(null); setCellSt({}); setDone(false); setExitDlg(false);
    setSubmitting(false); setSubmitResult(null); setSubmitted(false);
    setScreen("puzzle");
  },[]);

  const tryExit=useCallback(()=>{
    if(solved.size>0&&!done){setPaused(true);setExitDlg(true)}
    else{setScreen("home");setRunning(false);setPid(null)}
  },[solved,done]);

  const doExit=useCallback(()=>{setScreen("home");setRunning(false);setPid(null);setExitDlg(false)},[]);

  const pickWord=useCallback((r,c)=>{
    if(!pz) return;
    const k=`${r}-${c}`;const here=pz.c2w[k]||[];
    if(!here.length) return;
    if(cursor===k&&here.length>1&&active){
      const other=here.find(e=>e.dir!==active.dir);
      if(other){setActive(pz.words[other.idx]);return}
    }
    let pick=active?here.find(e=>e.dir===active.dir):null;
    if(!pick) pick=here[0];
    setActive(pz.words[pick.idx]);setCursor(k);
  },[pz,cursor,active]);

  const checkWord=useCallback(w=>{
    const cs=getCells(w);let ok=true;const ns={...cellSt};
    cs.forEach(({k,l})=>{if((input[k]||"")===l)ns[k]="ok";else{ns[k]="err";ok=false}});
    setCellSt(ns);
    const sk=wkey(w);
    if(ok&&!solved.has(sk)){
      const nv=new Set(solved);nv.add(sk);setSolved(nv);
      const base=w.word.length*10;const pen=hinted.has(sk)?Math.floor(base*0.5):0;
      setScore(s=>s+base-pen);
      if(nv.size===total){setRunning(false);setDone(true)}
    }
  },[cellSt,input,solved,hinted,total]);

  const giveHint=useCallback(w=>{
    const sk=wkey(w);if(solved.has(sk))return;
    for(const{k,l}of getCells(w)){
      if((input[k]||"")!==l){
        setInput(p=>({...p,[k]:l}));setCellSt(p=>({...p,[k]:"hint"}));
        setHinted(p=>new Set(p).add(sk));return;
      }
    }
  },[solved,input]);

  const onInput=useCallback((r,c,val)=>{
    const v=val.toUpperCase().replace(/[^A-Z]/g,"").slice(-1);
    const k=`${r}-${c}`;
    setInput(p=>({...p,[k]:v}));setCellSt(p=>{const n={...p};delete n[k];return n});
    if(v&&active){const cs=getCells(active);const i=cs.findIndex(x=>x.r===r&&x.c===c);
      if(i>=0&&i<cs.length-1){const nx=cs[i+1];setCursor(nx.k);setTimeout(()=>refs.current[nx.k]?.focus(),20)}}
  },[active]);

  const onKey=useCallback((e,r,c)=>{
    if(!active)return;const k=`${r}-${c}`;
    if(e.key==="Backspace"&&!input[k]){
      const cs=getCells(active);const i=cs.findIndex(x=>x.r===r&&x.c===c);
      if(i>0){const pv=cs[i-1];setInput(p=>({...p,[pv.k]:""}));setCursor(pv.k);setTimeout(()=>refs.current[pv.k]?.focus(),20)}
    }
  },[active,input]);

  const cellCls=useCallback((r,c)=>{
    const k=`${r}-${c}`;const s=cellSt[k];
    if(s==="ok")return"c-ok";if(s==="err")return"c-err";if(s==="hint")return"c-hint";
    if(cursor===k)return"c-cur";if(selSet.has(k))return"c-sel";
    return"bg-white border-gray-300";
  },[cellSt,cursor,selSet]);

  const isCellDone=useCallback(k=>cellSt[k]==="ok"||cellSt[k]==="hint",[cellSt]);
  const isWDone=useCallback(w=>solved.has(wkey(w)),[solved]);

  // Submit score to Google Sheets
  const doSubmit=useCallback(async()=>{
    if(!pz||submitted||submitting) return;
    setSubmitting(true);
    const data={
      nama: nama.trim(),
      nim: nim.trim(),
      puzzle: pz.label,
      skor: score,
      waktu: fmt(secs),
      hints: hinted.size,
      totalKata: total,
      kataBenar: solved.size
    };
    const res=await submitScore(data);
    setSubmitResult(res);
    setSubmitting(false);
    if(res.success) setSubmitted(true);
  },[pz,nama,nim,score,secs,hinted,total,solved,submitted,submitting]);

  // Fetch leaderboard
  const openLeaderboard=useCallback(async(puzzleLabel)=>{
    setScreen("leaderboard");
    setLbPuzzle(puzzleLabel||null);
    setLbLoading(true);
    if(!SCRIPT_URL){
      try{
        const all=JSON.parse(localStorage.getItem('tts_scores')||'[]');
        const grouped={};
        all.forEach(e=>{
          if(puzzleLabel&&e.puzzle!==puzzleLabel) return;
          if(!grouped[e.puzzle]) grouped[e.puzzle]=[];
          grouped[e.puzzle].push(e);
        });
        for(const p in grouped){grouped[p].sort((a,b)=>b.skor-a.skor);grouped[p]=grouped[p].slice(0,20);}
        setLbData(grouped);
      }catch(e){setLbData({});}
      setLbLoading(false);
      return;
    }
    const res=await fetchLeaderboard(puzzleLabel);
    setLbData(res.success?res.leaderboard:null);
    setLbLoading(false);
  },[]);

  const hasApi=!!SCRIPT_URL;

  /* ════════════════════════════════════════════
     LOGIN SCREEN — Nama & NIM
     ════════════════════════════════════════════ */
  if(screen==="login") return(
    <div className="min-h-screen bg-stone-50 flex items-center justify-center p-4">
      <div className="max-w-sm w-full fade">
        <div className="text-center mb-8">
          <div className="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-stone-800 text-white mb-4 shadow-xl shadow-stone-400/20">
            <div className="text-center">
              <div className="text-sm opacity-40 mb-0.5">☪</div>
              <div className="text-lg font-bold tracking-[3px]">TTS</div>
            </div>
          </div>
          <h1 className="text-2xl font-bold text-stone-800">Teka-Teki Silang</h1>
          <p className="text-sm text-stone-400 mt-1">Khulafaur Rasyidin & Peradaban Islam</p>
        </div>

        <div className="bg-white rounded-2xl border border-stone-200 p-6 shadow-sm">
          <p className="text-sm font-semibold text-stone-700 mb-5 text-center">Masukkan Identitas</p>
          <div className="space-y-5">
            <div>
              <label className="text-xs font-medium text-stone-500 uppercase tracking-wider">Nama Lengkap *</label>
              <input type="text" value={nama} onChange={e=>setNama(e.target.value)}
                placeholder="Contoh: Ahmad Fauzi"
                className="name-input mt-1 text-stone-800 font-medium" maxLength={100} autoFocus />
            </div>
            <div>
              <label className="text-xs font-medium text-stone-500 uppercase tracking-wider">NIM <span className="text-stone-400">(opsional)</span></label>
              <input type="text" value={nim} onChange={e=>setNim(e.target.value)}
                placeholder="Contoh: 2024010123"
                className="name-input mt-1 text-stone-800" maxLength={30} />
            </div>
          </div>
          <button onClick={()=>{if(nama.trim())setScreen("home")}}
            disabled={!nama.trim()}
            className={`w-full mt-6 py-3 rounded-xl text-sm font-bold transition-all
              ${nama.trim()
                ?"bg-stone-800 text-white hover:bg-stone-700 active:scale-[0.98] shadow-lg shadow-stone-300/30"
                :"bg-stone-200 text-stone-400 cursor-not-allowed"}`}>

              title="Klik untuk ganti arah">
              {active.num}{active.dir==="across"?"→":"↓"}
            </button>
            <div className="flex-1 min-w-0">
              <p className="text-xs text-sky-900 leading-relaxed">{active.clue}</p>
              <p className="text-xs text-sky-500 mt-0.5">({active.len} huruf)</p>
            </div>
            <button onClick={()=>giveHint(active)} className="text-sm px-2.5 py-1.5 bg-amber-50 border border-amber-300 rounded-lg hover:bg-amber-100 active:bg-amber-200 shrink-0 transition-colors" title="Buka 1 huruf">💡</button>
            <button onClick={()=>checkWord(active)} className="text-sm px-2.5 py-1.5 bg-emerald-50 border border-emerald-300 rounded-lg hover:bg-emerald-100 active:bg-emerald-200 shrink-0 font-bold text-emerald-700 transition-colors" title="Cek jawaban">✓</button>
          </div>
        )}

        {/* CLUES */}
        {["across","down"].map(dir=>{
          const label=dir==="across"?"MENDATAR →":"MENURUN ↓";
          const list=dir==="across"?pz.ac:pz.dn;
          return(
            <div key={dir} className="bg-white rounded-xl border border-stone-200 mb-2 overflow-hidden">
              <div className="bg-stone-100 px-3 py-2 border-b border-stone-200">
                <span className="text-xs font-bold text-stone-500 tracking-wider uppercase">{label}</span>
              </div>
              <div className="divide-y divide-stone-100 max-h-64 sm:max-h-96 overflow-y-auto clue-list">
                {list.map(w=>{const wd=isWDone(w);const sel=active?.num===w.num&&active?.dir===w.dir;return(
                  <div key={`${w.dir}-${w.num}`}
                    className={`flex items-start gap-2 px-3 py-2 cursor-pointer transition-colors ${sel?"bg-sky-50":"hover:bg-stone-50"} ${wd?"opacity-40":""}`}
                    onClick={()=>{setActive(w);setCursor(`${w.row}-${w.col}`);setTimeout(()=>refs.current[`${w.row}-${w.col}`]?.focus(),30)}}>
                    <span className="text-xs font-bold text-stone-400 w-6 shrink-0 text-right tabular-nums">{w.num}.</span>
                    <div className="flex-1 min-w-0">
                      <p className={`text-xs leading-relaxed ${wd?"line-through text-stone-400":"text-stone-700"}`}>
                        {w.clue} <span className="text-stone-400">({w.len})</span>
                      </p>
                      {wd&&<p className="text-xs text-emerald-500 font-bold mt-0.5">✓ {w.word}</p>}
                    </div>
                    {!wd&&<div className="flex gap-1.5 shrink-0 no-print">
                      <button onClick={e=>{e.stopPropagation();giveHint(w)}} className="text-sm text-amber-500 hover:text-amber-700 transition-colors">💡</button>
                      <button onClick={e=>{e.stopPropagation();checkWord(w)}} className="text-sm text-emerald-600 hover:text-emerald-800 font-bold transition-colors">✓</button>
                    </div>}
                  </div>
                )})}
              </div>
            </div>
          );
        })}

        <div className="flex flex-wrap gap-3 justify-center text-xs text-stone-400 py-3 no-print">
          {[["c-ok","Benar"],["c-err","Salah"],["c-hint","Hint"],["c-sel","Aktif"]].map(([cl,lb])=>(
            <div key={lb} className="flex items-center gap-1"><div className={`w-3 h-3 border rounded-sm ${cl}`}/>{lb}</div>
          ))}
        </div>
        <p className="text-center text-xs text-stone-300 pb-2 no-print">
          💡 buka 1 huruf (−50%) · ✓ cek jawaban · ketuk ulang untuk ganti arah
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

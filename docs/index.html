<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TTS Interaktif — Khulafaur Rasyidin & Peradaban Islam</title>
<meta name="description" content="Teka-Teki Silang interaktif tentang Khulafaur Rasyidin dan Peradaban Islam. Dilengkapi timer, skor, hint, dan cek jawaban otomatis.">
<meta name="theme-color" content="#292524">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☪</text></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  input { -webkit-appearance: none; border-radius: 0; }
  .grid-scroll::-webkit-scrollbar { height: 4px; }
  .grid-scroll::-webkit-scrollbar-thumb { background: #a8a29e; border-radius: 2px; }
  @media print { .no-print { display: none !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const RAW={"p1":{"r":20,"c":25,"w":[[2,"BAIAT","Sumpah setia dan pengakuan formal terhadap seorang pemimpin",1,2,1],[3,"FITNA","Kekacauan atau perang saudara dalam komunitas Muslim",1,8,1],[5,"QADHI","Hakim dalam sistem hukum Islam",2,2,1],[6,"KHUMUS","Seperlima dari rampasan perang yang diserahkan kepada negara",2,9,1],[9,"NAHJUL","Kompilasi khotbah dan surat Ali: ___ Balaghah",4,3,1],[13,"HIJRIAH","Kalender lunar Islam yang ditetapkan Umar",5,4,1],[14,"IMAMAH","Doktrin Syiah tentang kepemimpinan ilahi",5,14,1],[15,"IJTIHAD","Penalaran independen untuk merumuskan hukum syariat",6,5,1],[18,"WALI","Gubernur provinsi yang ditunjuk oleh khalifah",7,0,1],[20,"QADISIYYAH","Pertempuran besar melawan Sassanid Persia (636 M)",8,5,1],[24,"DIWAN","Register resmi negara untuk distribusi tunjangan",9,20,1],[25,"UMMAH","Komunitas Muslim secara keseluruhan",10,0,1],[27,"SUNNAH","Preseden dan praktik Nabi; sumber hukum Islam kedua",10,17,1],[29,"YARMOUK","Pertempuran pembuka penguasaan Muslim atas Suriah",11,17,1],[30,"DHIMMI","Non-Muslim di bawah perlindungan negara Islam",12,4,1],[32,"KHAWARIJ","Kelompok pemisah dari Ali setelah Arbitrase Shiffin",12,11,1],[34,"SHIFFIN","Pertempuran Ali vs Muawiyah di tepi Eufrat",14,12,1],[36,"JIZYA","Pajak per kapita oleh pria dewasa non-Muslim",15,1,1],[38,"HAFIZ","Penghafal seluruh Al-Quran",15,7,1],[39,"USHR","Bea cukai di pos-pos perbatasan negara Islam",17,14,1],[40,"SAWAD","Wilayah subur antara Sungai Tigris dan Eufrat",18,2,1],[1,"RIDDAH","Kemurtadan/pembangkangan politis terhadap Madinah",0,4,0],[4,"AMSHAR","Kota-kota garnisun di wilayah taklukan",1,12,0],[7,"SAQIFAH","Tempat bai'at pertama kepada Abu Bakar",2,14,0],[8,"MAWALI","Muslim non-Arab, umumnya mantan budak",2,16,0],[10,"KHALIFAH","Jabatan kepala negara Islam pasca-Nabi SAW",4,10,0],[11,"WAQAF","Aset sedekah permanen untuk kepentingan umum",4,18,0],[12,"SHURA","Prinsip musyawarah kolektif dalam Islam",4,19,0],[16,"GHANIMAH","Rampasan perang pasukan Muslim",6,13,0],[17,"MUAWIYAH","Gubernur Suriah yang menolak tunduk kepada Ali",6,15,0],[19,"IJMA","Konsensus ulama; sumber hukum Islam ketiga",7,3,0],[21,"SYARIAT","Hukum Islam dari Al-Quran dan Sunnah",8,9,0],[22,"RASYIDIN","Sebutan empat khalifah pertama",8,17,0],[23,"TAHKIM","Arbitrase setelah Pertempuran Shiffin",8,23,0],[26,"HUDUD","Hukuman tetap yang ditetapkan Al-Quran",10,4,0],[28,"KHARAJ","Pajak tanah pertanian wilayah taklukan",11,5,0],[31,"MUSHAF","Al-Quran dalam bentuk tertulis terjilid",12,7,0],[33,"JAMAL","Pertempuran di Basra; unta Aisyah",14,8,0],[35,"FIQH","Yurisprudensi Islam; ilmu hukum syariat",14,16,0],[37,"ZAKAT","Kewajiban fiskal; salah satu Rukun Islam",15,3,0]]},"p2":{"r":29,"c":27,"w":[[1,"IKHWAN","Persaudaraan; ukhuwah Islamiyah",0,16,1],[4,"ZELLIGE","Seni mosaik keramik geometris Maroko",1,18,1],[5,"OTTOMAN","Kekaisaran Islam terakhir, tiga benua",3,15,1],[7,"ASTROLABE","Instrumen astronomi ilmuwan Muslim",6,17,1],[8,"ALJABAR","Matematika oleh Al-Khawarizmi",7,20,1],[9,"TARIQAH","Jalan spiritual; ordo sufi",8,14,1],[10,"HAMMAM","Pemandian umum khas peradaban Islam",9,0,1],[13,"MASJID","Tempat ibadah utama umat Islam",10,4,1],[14,"ALGORITMA","Prosedur komputasi dari Al-Khawarizmi",10,13,1],[17,"MIHRAB","Ceruk masjid penunjuk arah kiblat",12,8,1],[18,"ANDALUSIA","Wilayah Islam di Semenanjung Iberia",13,5,1],[19,"TASAWUF","Dimensi spiritual-mistis Islam",14,11,1],[20,"BIMARISTAN","Rumah sakit Islam abad pertengahan",15,8,1],[21,"ARABESQUE","Seni dekoratif pola geometris Islam",17,11,1],[23,"FALAK","Ilmu astronomi Islam; waktu shalat & kiblat",19,4,1],[26,"KAIROUAN","Kota suci keempat Islam di Tunisia",22,4,1],[28,"BAITUL","Pusat riset Baghdad: ___ Hikmah",25,9,1],[2,"ALHAMBRA","Istana Islam megah di Granada, Spanyol",0,20,0],[3,"RIHLA","Tradisi perjalanan ilmiah; Ibnu Battuta",0,22,0],[6,"KALIGRAFI","Seni menulis indah huruf Arab",5,17,0],[11,"MADRASAH","Lembaga pendidikan Islam formal",9,5,0],[12,"UMAYYAH","Dinasti Islam pertama di Damaskus",9,20,0],[14,"ABBASIYAH","Dinasti Baghdad pusat keilmuan dunia",10,13,0],[15,"AVERROES","Ibnu Rusyd; komentator Aristoteles",10,21,0],[16,"MINARET","Menara masjid untuk adzan",11,6,0],[21,"AVICENNA","Ibnu Sina; bapak kedokteran Islam",17,11,0],[22,"WAZIR","Perdana menteri khalifah/sultan",18,7,0],[24,"ALHAZEN","Ibnu Haitham; bapak optika modern",19,5,0],[25,"MUQARNAS","Ornamen sarang lebah 3D Islam",19,10,0],[27,"SULTAN","Gelar penguasa pasca-kekhalifahan",23,14,0]]}};

function parse(p){
  const g=Array.from({length:p.r},()=>Array.from({length:p.c},()=>({l:"",n:0,a:false})));
  const ws=p.w.map(([n,w,cl,row,col,isA])=>{
    const d=isA?"across":"down";
    for(let i=0;i<w.length;i++){
      const r=d==="across"?row:row+i,c=d==="across"?col+i:col;
      if(r<p.r&&c<p.c){g[r][c].l=w[i];g[r][c].a=true;if(i===0)g[r][c].n=n}
    }
    return{n,w,cl,row,col,d}
  });
  return{g,R:p.r,C:p.c,ws,ac:ws.filter(x=>x.d==="across").sort((a,b)=>a.n-b.n),dn:ws.filter(x=>x.d==="down").sort((a,b)=>a.n-b.n)}
}

const PZ={
  1:{...parse(RAW.p1),title:"TTS I — Khulafaur Rasyidin",sub:"Politik, Hukum, Militer & Ekonomi"},
  2:{...parse(RAW.p2),title:"TTS II — Peradaban Islam",sub:"Ilmu Pengetahuan, Seni & Arsitektur"}
};

const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

function App(){
  const[pid,setPid]=useState(null);
  const[ug,setUg]=useState({});
  const[sec,setSec]=useState(0);
  const[on,setOn]=useState(false);
  const[sc,setSc]=useState(0);
  const[sv,setSv]=useState(new Set());
  const[ht,setHt]=useState(new Set());
  const[sw,setSw]=useState(null);
  const[ck,setCk]=useState({});
  const[done,setDone]=useState(false);
  const rr=useRef({});
  const tr=useRef(null);

  useEffect(()=>{if(on){tr.current=setInterval(()=>setSec(t=>t+1),1000)}return()=>clearInterval(tr.current)},[on]);

  const go=(id)=>{
    const p=PZ[id];const u={};
    for(let r=0;r<p.R;r++)for(let c=0;c<p.C;c++)if(p.g[r][c].a)u[`${r}-${c}`]="";
    setPid(id);setUg(u);setSec(0);setOn(true);setSc(0);setSv(new Set());setHt(new Set());setSw(null);setCk({});setDone(false);
  };

  const pz=pid?PZ[pid]:null;
  const tot=pz?pz.ws.length:0;

  const cells=(w)=>{
    const c=[];
    for(let i=0;i<w.w.length;i++){
      const r=w.d==="across"?w.row:w.row+i,co=w.d==="across"?w.col+i:w.col;
      c.push({r,c:co,k:`${r}-${co}`,l:w.w[i]})
    }
    return c
  };

  const chk=(w)=>{
    const cs=cells(w);let ok=true;const nc={...ck};
    cs.forEach(({k,l})=>{if((ug[k]||"")===l)nc[k]="ok";else{nc[k]="err";ok=false}});
    setCk(nc);
    if(ok&&!sv.has(w.n)){
      const ns=new Set(sv);ns.add(w.n);setSv(ns);
      const base=w.w.length*10;const pen=ht.has(w.n)?Math.floor(base*0.5):0;
      setSc(s=>s+base-pen);
      if(ns.size===tot){setOn(false);setDone(true)}
    }
  };

  const hint=(w)=>{
    if(sv.has(w.n))return;
    for(const{k,l}of cells(w)){
      if((ug[k]||"")!==l){
        setUg(p=>({...p,[k]:l}));setCk(p=>({...p,[k]:"hint"}));setHt(p=>new Set(p).add(w.n));return;
      }
    }
  };

  const inp=(r,c,val)=>{
    const v=val.toUpperCase().replace(/[^A-Z]/g,"").slice(-1);
    setUg(p=>({...p,[`${r}-${c}`]:v}));
    setCk(p=>{const n={...p};delete n[`${r}-${c}`];return n});
    if(v&&sw){const cs=cells(sw);const idx=cs.findIndex(x=>x.r===r&&x.c===c);if(idx>=0&&idx<cs.length-1){const nx=cs[idx+1];setTimeout(()=>rr.current[nx.k]?.focus(),20)}}
  };

  const kd=(e,r,c)=>{
    if(!sw)return;
    if(e.key==="Backspace"&&!ug[`${r}-${c}`]){
      const cs=cells(sw);const i=cs.findIndex(x=>x.r===r&&x.c===c);
      if(i>0){const pv=cs[i-1];setUg(p=>({...p,[pv.k]:""}));setTimeout(()=>rr.current[pv.k]?.focus(),20)}
    }
  };

  const sc2=sw?new Set(cells(sw).map(x=>x.k)):new Set();
  const cst=(r,c)=>{
    const k=`${r}-${c}`;
    if(ck[k]==="ok")return"bg-emerald-100 border-emerald-500";
    if(ck[k]==="err")return"bg-red-50 border-red-400";
    if(ck[k]==="hint")return"bg-amber-50 border-amber-400";
    if(sc2.has(k))return"bg-sky-50 border-sky-300";
    return"bg-white border-gray-300"
  };

  // HOME
  if(!pid)return(
    <div className="min-h-screen bg-stone-50 flex items-center justify-center p-4">
      <div className="max-w-sm w-full">
        <div className="text-center mb-8">
          <div className="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-stone-800 text-white mb-4" style={{fontSize:18,fontFamily:"serif",fontWeight:"bold",letterSpacing:2,lineHeight:1.2}}>
            <div className="text-center"><div style={{fontSize:11,opacity:0.6}}>☪</div><div>TTS</div></div>
          </div>
          <h1 className="text-2xl font-bold text-stone-800">Teka-Teki Silang</h1>
          <p className="text-sm text-stone-400 mt-1">Khulafaur Rasyidin & Peradaban Islam</p>
        </div>
        {[1,2].map(id=>{const p=PZ[id];return(
          <button key={id} onClick={()=>go(id)} className="w-full mb-3 text-left p-5 bg-white rounded-2xl border border-stone-200 hover:border-stone-400 hover:shadow-lg transition-all active:scale-[0.98]">
            <div className="flex items-center justify-between">
              <div><div className="font-bold text-stone-800">{p.title}</div><div className="text-xs text-stone-400 mt-1">{p.sub}</div></div>
              <div className="text-right"><div className="text-2xl font-bold text-stone-300">{p.ws.length}</div><div className="text-xs text-stone-400">kata</div></div>
            </div>
          </button>
        )})}
        <div className="mt-6 p-4 bg-white rounded-2xl border border-stone-200">
          <p className="text-xs font-semibold text-stone-500 mb-3 text-center">Cara Bermain</p>
          <div className="grid grid-cols-2 gap-3 text-xs text-stone-500">
            <div className="flex items-start gap-2"><span className="text-base">⏱</span><div><b>Timer</b><br/>Waktu otomatis</div></div>
            <div className="flex items-start gap-2"><span className="text-base">🏆</span><div><b>Skor</b><br/>Kata × 10 poin</div></div>
            <div className="flex items-start gap-2"><span className="text-base">💡</span><div><b>Hint</b><br/>Buka 1 huruf (-50%)</div></div>
            <div className="flex items-start gap-2"><span className="text-base">✓</span><div><b>Cek</b><br/>Periksa per kata</div></div>
          </div>
        </div>
        <p className="text-center text-xs text-stone-300 mt-4">v1.0 — 70 istilah sejarah & peradaban Islam</p>
      </div>
    </div>
  );

  // PUZZLE
  const cSz=Math.max(20,Math.min(30,Math.floor((Math.min(window.innerWidth-16,520))/pz.C)));

  return(
    <div className="min-h-screen bg-stone-50 pb-6">
      <div className="bg-stone-800 text-white px-3 py-2 sticky top-0 z-20 shadow-lg no-print">
        <div className="flex items-center justify-between max-w-xl mx-auto">
          <button onClick={()=>{setPid(null);setOn(false)}} className="text-xs text-stone-400 hover:text-white">← Menu</button>
          <span className="text-xs text-stone-400 truncate mx-2">{pz.title}</span>
          <div className="font-mono font-bold text-lg tabular-nums">{fmt(sec)}</div>
        </div>
        <div className="flex items-center gap-2 max-w-xl mx-auto mt-1">
          <span className="text-xs bg-stone-700 px-2 py-0.5 rounded font-medium">{sc} poin</span>
          <span className="text-xs bg-stone-700 px-2 py-0.5 rounded">{sv.size}/{tot}</span>
          {ht.size>0&&<span className="text-xs bg-amber-900/60 px-2 py-0.5 rounded">💡×{ht.size}</span>}
          <div className="flex-1 h-1.5 bg-stone-700 rounded-full overflow-hidden ml-1"><div className="h-full bg-emerald-400 rounded-full transition-all duration-500" style={{width:`${(sv.size/tot)*100}%`}}/></div>
        </div>
      </div>

      {done&&<div className="mx-3 mt-3 p-5 bg-emerald-50 border-2 border-emerald-300 rounded-2xl text-center">
        <div className="text-4xl mb-2">🎉</div>
        <div className="font-bold text-emerald-800 text-lg">Alhamdulillah, Selesai!</div>
        <div className="text-sm text-emerald-700 mt-2">Waktu: <b>{fmt(sec)}</b> — Skor: <b>{sc}</b></div>
        <div className="text-xs text-emerald-600 mt-1">{ht.size===0?"Sempurna tanpa bantuan! 🌟":ht.size<=3?"Sangat baik!":"Terus belajar!"}</div>
        <button onClick={()=>{setPid(null);setOn(false)}} className="mt-3 bg-emerald-600 text-white px-5 py-2 rounded-xl text-sm font-medium hover:bg-emerald-700">Kembali ke Menu</button>
      </div>}

      <div className="max-w-xl mx-auto px-2 mt-2">
        <div className="overflow-x-auto pb-1 grid-scroll" style={{WebkitOverflowScrolling:"touch"}}>
          <div className="inline-grid mx-auto" style={{gridTemplateColumns:`repeat(${pz.C},${cSz}px)`,gap:0,border:"1.5px solid #78716c"}}>
            {Array.from({length:pz.R}).map((_,r)=>
              Array.from({length:pz.C}).map((_,c)=>{
                const cell=pz.g[r][c];const k=`${r}-${c}`;
                if(!cell.a)return <div key={k} style={{width:cSz,height:cSz}} className="bg-stone-300"/>;
                const isSolved=ck[k]==="ok"||ck[k]==="hint";
                return(<div key={k} style={{width:cSz,height:cSz}} className={`relative border ${cst(r,c)} transition-colors`}>
                  {cell.n>0&&<span className="absolute text-stone-500 font-bold leading-none" style={{fontSize:Math.max(7,cSz*0.28),top:0.5,left:1}}>{cell.n}</span>}
                  <input ref={el=>rr.current[k]=el} type="text" inputMode="text" autoComplete="off" autoCorrect="off" autoCapitalize="characters" spellCheck="false"
                    value={ug[k]||""} maxLength={2} onChange={e=>inp(r,c,e.target.value)} onKeyDown={e=>kd(e,r,c)}
                    onFocus={()=>{const w=pz.ws.find(w=>cells(w).some(x=>x.r===r&&x.c===c));if(w)setSw(w)}}
                    disabled={isSolved} className="w-full h-full text-center font-bold bg-transparent outline-none uppercase"
                    style={{fontSize:Math.max(10,cSz*0.48),paddingTop:cell.n>0?cSz*0.15:0,color:ck[k]==="hint"?"#b45309":"#1c1917",caretColor:"#0284c7"}}/>
                </div>)
              })
            )}
          </div>
        </div>

        {sw&&!sv.has(sw.n)&&<div className="bg-sky-50 border border-sky-200 rounded-xl p-2.5 my-2 flex items-start gap-2 no-print">
          <span className="bg-sky-600 text-white text-xs font-bold px-1.5 py-0.5 rounded shrink-0 mt-0.5">{sw.n}{sw.d==="across"?"→":"↓"}</span>
          <p className="text-xs text-sky-900 flex-1 leading-relaxed">{sw.cl}</p>
          <button onClick={()=>hint(sw)} className="text-sm px-2 py-1 bg-amber-50 border border-amber-300 rounded-lg hover:bg-amber-100 shrink-0">💡</button>
          <button onClick={()=>chk(sw)} className="text-sm px-2 py-1 bg-emerald-50 border border-emerald-300 rounded-lg hover:bg-emerald-100 shrink-0 font-bold text-emerald-700">✓</button>
        </div>}

        {["across","down"].map(dir=>{
          const label=dir==="across"?"MENDATAR →":"MENURUN ↓";
          const list=dir==="across"?pz.ac:pz.dn;
          return(<div key={dir} className="bg-white rounded-xl border border-stone-200 mb-2 overflow-hidden">
            <div className="bg-stone-100 px-3 py-1.5 border-b border-stone-200"><span className="text-xs font-bold text-stone-500 tracking-wider">{label}</span></div>
            <div className="divide-y divide-stone-100 max-h-56 overflow-y-auto">
              {list.map(w=>{const isSv=sv.has(w.n);const isSel=sw?.n===w.n&&sw?.d===w.d;return(
                <div key={`${w.d}-${w.n}`} className={`flex items-start gap-1.5 px-3 py-1.5 cursor-pointer transition-colors ${isSel?"bg-sky-50":"hover:bg-stone-50"} ${isSv?"opacity-40":""}`}
                  onClick={()=>{setSw(w);setTimeout(()=>rr.current[`${w.row}-${w.col}`]?.focus(),30)}}>
                  <span className="text-xs font-bold text-stone-400 w-6 shrink-0 text-right">{w.n}.</span>
                  <p className={`text-xs leading-relaxed flex-1 ${isSv?"line-through text-stone-400":"text-stone-700"}`}>{w.cl}</p>
                  {!isSv&&<div className="flex gap-1 shrink-0 no-print">
                    <button onClick={e=>{e.stopPropagation();hint(w)}} className="text-xs text-amber-500 hover:text-amber-700">💡</button>
                    <button onClick={e=>{e.stopPropagation();chk(w)}} className="text-xs text-emerald-600 hover:text-emerald-800 font-bold">✓</button>
                  </div>}
                  {isSv&&<span className="text-emerald-500 text-xs font-bold">✓ {w.w}</span>}
                </div>
              )})}
            </div>
          </div>)
        })}

        <div className="flex flex-wrap gap-2 justify-center text-xs text-stone-400 py-2 no-print">
          {[["bg-emerald-100 border-emerald-500","Benar"],["bg-red-50 border-red-400","Salah"],["bg-amber-50 border-amber-400","Hint"],["bg-sky-50 border-sky-300","Aktif"]].map(([cls,lb])=>
            <div key={lb} className="flex items-center gap-1"><div className={`w-2.5 h-2.5 border rounded-sm ${cls}`}/>{lb}</div>
          )}
        </div>
        <p className="text-center text-xs text-stone-300 pb-4 no-print">💡 buka 1 huruf (skor -50%) · ✓ cek jawaban</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
